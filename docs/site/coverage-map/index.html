<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <!-- Мета-тег viewport для корректного масштабирования на мобильных устройствах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILAM Pollen coverage map</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      :root {
        --ui-font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        --ui-font-size: 12px;
        --ui-line-height: 1.2;
        --ui-bg: #f7fbfb;
        --ui-panel: rgba(255, 255, 255, 0.78);
        --ui-panel-strong: rgba(255, 255, 255, 0.92);
        --ui-text: #153235;
        --ui-muted: rgba(21, 50, 53, 0.68);
        --ui-border: rgba(24, 121, 113, 0.22);
        --ui-shadow: 0 18px 46px rgba(9, 74, 72, 0.18);
        --ui-accent: #22b8a0;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --ui-bg: #071314;
          --ui-panel: rgba(9, 28, 30, 0.78);
          --ui-panel-strong: rgba(9, 28, 30, 0.92);
          --ui-text: #e8fffb;
          --ui-muted: rgba(232, 255, 251, 0.68);
          --ui-border: rgba(110, 231, 216, 0.24);
          --ui-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
          --ui-accent: #6ee7d8;
        }
      }

      body {
        background: var(--ui-bg);
        font: var(--ui-font-size)/var(--ui-line-height) var(--ui-font-family);
        color: var(--ui-text);
      }

      .map {
        width: 100%;
        height: 100%;
        position: relative;
        background: var(--ui-bg);
      }

      .map::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 900;
        background:
          radial-gradient(circle at 18% 18%, rgba(34, 184, 160, 0.12), transparent 34%),
          radial-gradient(circle at 82% 12%, rgba(79, 140, 255, 0.10), transparent 34%);
        mix-blend-mode: multiply;
      }

      @media (prefers-color-scheme: dark) {
        .map::before {
          mix-blend-mode: screen;
          opacity: 0.42;
        }
      }

      /* Окно для отображения координат и активной зоны */
      .info-window {
        position: absolute;
        pointer-events: none;
        padding: 7px 9px;
        background: var(--ui-panel-strong);
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        font: var(--ui-font-size)/var(--ui-line-height) var(--ui-font-family);
        border: 1px solid var(--ui-border);
        border-radius: 12px;
        color: var(--ui-text);
        white-space: nowrap;
        z-index: 1200;
        box-shadow: var(--ui-shadow);
      }

      .mobile-info {
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
      }

      /* Центровой указатель на мобильных */
      .center-pointer {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
        z-index: 1100;
        filter: drop-shadow(0 2px 5px rgba(0,0,0,0.18));
      }

      @media (min-width: 768px) {
        .center-pointer {
          display: none;
        }
      }

      .ol-zoom {
        right: auto !important;
        left: .75rem !important;
        top: .75rem !important;
      }

      .ol-control {
        background: transparent !important;
      }

      .ol-zoom button {
        width: 32px;
        height: 32px;
        margin: 0 0 6px 0;
        border-radius: 12px;
        border: 1px solid var(--ui-border);
        background: var(--ui-panel-strong);
        color: var(--ui-text);
        box-shadow: 0 10px 30px rgba(9, 74, 72, 0.12);
        backdrop-filter: blur(14px) saturate(140%);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        transition: transform .16s ease, border-color .16s ease, background .16s ease;
      }

      .ol-zoom button:hover,
      .ol-zoom button:focus {
        transform: translateY(-1px);
        border-color: color-mix(in srgb, var(--ui-accent), transparent 35%);
        background: var(--ui-panel-strong);
      }

      .legend-control {
        top: .75rem;
        left: 3.95rem;
        right: auto;
        background: var(--ui-panel-strong);
        border: 1px solid var(--ui-border);
        border-radius: 16px;
        padding: 7px 9px;
        font: var(--ui-font-size)/var(--ui-line-height) var(--ui-font-family);
        color: var(--ui-text);
        box-shadow: var(--ui-shadow);
        backdrop-filter: blur(18px) saturate(150%);
        -webkit-backdrop-filter: blur(18px) saturate(150%);
      }

      .legend-control .row {
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 3px 0;
        white-space: nowrap;
      }

      .legend-control input[type="checkbox"] {
        margin: 0;
        width: 14px;
        height: 14px;
        border-radius: 5px;
      }

      .legend-control .name {
        opacity: 0.95;
        font-weight: 650;
        letter-spacing: -0.01em;
      }

      .legend-control .legend-info {
        position: static !important;
        transform: none !important;
        left: auto !important;
        top: auto !important;
        margin-top: 7px;
        padding-top: 7px;
        border-top: 1px solid var(--ui-border) !important;
        box-shadow: none !important;
        background: transparent !important;
        border-left: 0 !important;
        border-right: 0 !important;
        border-bottom: 0 !important;
        border-radius: 0 !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
        white-space: normal;
        pointer-events: none;
        opacity: 0.95;
        width: 100%;
      }

      @media (max-width: 767px) {
        .legend-control {
          max-width: calc(100vw - 5rem);
          padding: 7px 9px;
        }
      }
      
    /* ------------------------------------------------------------------
       SILAM map theme support
       ------------------------------------------------------------------ */
    :root {
      --silam-map-bg: #eef7f2;
      --silam-map-panel-bg: rgba(112, 239, 112, 0.84);
      --silam-map-panel-border: rgba(22, 138, 74, 0.18);
      --silam-map-text: #0f2430;
      --silam-map-muted: rgba(15, 36, 48, 0.78);
      --silam-map-button-bg: rgba(255, 255, 255, 0.9);
      --silam-map-button-text: #0f2430;
      --silam-map-button-border: rgba(15, 36, 48, 0.14);
      --silam-map-shadow: 0 18px 46px rgba(15, 23, 42, 0.18);
    }

    html[data-theme="dark"] {
      --silam-map-bg: #071314;
      --silam-map-panel-bg: rgba(9, 30, 26, 0.9);
      --silam-map-panel-border: rgba(94, 234, 212, 0.2);
      --silam-map-text: #ecfeff;
      --silam-map-muted: rgba(236, 254, 255, 0.74);
      --silam-map-button-bg: rgba(15, 23, 42, 0.92);
      --silam-map-button-text: #ecfeff;
      --silam-map-button-border: rgba(94, 234, 212, 0.18);
      --silam-map-shadow: 0 22px 60px rgba(0, 0, 0, 0.44);
    }

    html[data-theme="dark"],
    html[data-theme="dark"] body {
      background: var(--silam-map-bg);
      color: var(--silam-map-text);
    }

    html[data-theme="dark"] #map {
      background: var(--silam-map-bg);
    }
html[data-theme="dark"] .ol-control button {
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
    }

    html[data-theme="dark"] .ol-attribution,
    html[data-theme="dark"] .ol-attribution ul {
      background: rgba(15, 23, 42, 0.78) !important;
      color: var(--silam-map-text) !important;
    }

    html[data-theme="dark"] .ol-attribution a {
      color: #7ab7ff !important;
    }

    html[data-theme="dark"] .mobile-center-pointer {
      color: #ecfeff;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.55));
    }

  
    /* Явно возвращаем светлые переменные, даже если ОС пользователя в dark mode,
       но Docusaurus-страница сейчас в light. */
    html[data-theme="light"] {
      --ui-bg: #f7fbfb;
      --ui-panel: rgba(255, 255, 255, 0.78);
      --ui-panel-strong: rgba(255, 255, 255, 0.92);
      --ui-text: #153235;
      --ui-muted: rgba(21, 50, 53, 0.68);
      --ui-border: rgba(24, 121, 113, 0.22);
      --ui-shadow: 0 18px 46px rgba(9, 74, 72, 0.18);
      --ui-accent: #22b8a0;
    }

    /* Dark theme меняет только тёмный режим. Светлая легенда остаётся
       на исходном стиле .legend-control выше. */
    html[data-theme="dark"] .legend-control {
      background: var(--ui-panel-strong) !important;
      border-color: var(--ui-border) !important;
      color: var(--ui-text) !important;
      box-shadow: var(--ui-shadow) !important;
    }

    html[data-theme="dark"] .legend-control label,
    html[data-theme="dark"] .legend-control span,
    html[data-theme="dark"] .legend-control div {
      color: var(--ui-text) !important;
    }

    html[data-theme="dark"] .legend-control .coordinates,
    html[data-theme="dark"] .coordinates {
      color: var(--ui-muted) !important;
    }

    html[data-theme="dark"] .ol-control button {
      border-color: var(--ui-border) !important;
      background: var(--ui-panel-strong) !important;
      color: var(--ui-text) !important;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
    }

  
    /* Тёмная тема карты через фильтр штатных OpenStreetMap tiles.
       Не применяем фильтр ко всей карте, чтобы controls/legend/attribution
       не инвертировались вместе с тайлами. */
    html[data-theme="dark"] .ol-layer canvas {
      filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

  </style>
  
  <script>
    (function () {
      function normalizeTheme(value) {
        return value === "dark" || value === "light" ? value : null;
      }

      function getParentTheme() {
        try {
          if (window.parent && window.parent !== window) {
            return normalizeTheme(
              window.parent.document.documentElement.getAttribute("data-theme")
            );
          }
        } catch (err) {
          return null;
        }
        return null;
      }

      function getStoredTheme() {
        try {
          return (
            normalizeTheme(window.localStorage.getItem("theme")) ||
            normalizeTheme(window.localStorage.getItem("docusaurus-theme"))
          );
        } catch (err) {
          return null;
        }
      }

      function getPreferredTheme() {
        return window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
      }

      const params = new URLSearchParams(window.location.search);
      const requestedTheme = normalizeTheme(params.get("theme"));

      // В iframe главным источником считаем тему родительского Docusaurus.
      // Это защищает от ситуации, когда при смене языка iframe получил
      // временный/дефолтный параметр theme=light, хотя сайт уже в dark.
      const theme =
        getParentTheme() ||
        requestedTheme ||
        getStoredTheme() ||
        getPreferredTheme();

      document.documentElement.dataset.theme = theme;
      window.__silamCoverageTheme = theme;
    })();
  </script>

</head>
  <body>
    <div id="map" class="map">
      <!-- Центровой указатель (виден только на мобильных) с inline SVG -->
      <div id="center-pointer" class="center-pointer">
        <svg width="20" height="20" viewBox="0 0 20 20" style="display:block;">
          <line x1="0" y1="10" x2="8" y2="10" stroke="rgba(0,0,0,0.3)" stroke-width="2" />
          <line x1="12" y1="10" x2="20" y2="10" stroke="rgba(0,0,0,0.3)" stroke-width="2" />
          <line x1="10" y1="0" x2="10" y2="8" stroke="rgba(0,0,0,0.3)" stroke-width="2" />
          <line x1="10" y1="12" x2="10" y2="20" stroke="rgba(0,0,0,0.3)" stroke-width="2" />
        </svg>
      </div>
      <!-- Элемент для отображения информации -->
      <div id="info-window" class="info-window"></div>
    </div>
    
    <!-- Внешний файл с координатами (rotatedPolygon и rotatedPolygonRegional должны быть определены) -->
    <script src="rotatedPolygon.js"></script>
    
    <!-- OpenLayers -->
    <script src="https://cdn.jsdelivr.net/npm/ol/dist/ol.js"></script>
    <!-- i18next и плагин для определения языка -->
    <script src="https://unpkg.com/i18next@latest/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-browser-languagedetector@latest/dist/umd/i18nextBrowserLanguageDetector.min.js"></script>
    
    <script>
      // Функция для определения мобильного устройства
      function isMobileDevice() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      }
      
      // Инициализация i18next
      i18next
        .use(i18nextBrowserLanguageDetector)
        .init({
          fallbackLng: 'en',
          load: 'languageOnly',
          detection: {
            order: ['querystring', 'htmlTag', 'navigator'],
            caches: []
          },
          resources: {
            ru: { translation: { lat: 'Широта', lon: 'Долгота' } },
            en: { translation: { lat: 'Lat', lon: 'Lon' } }
          }
        }, function(err, t) {
          console.log('navigator.language:', navigator.language);
          console.log('i18next.language:', i18next.language);
          window.onload = function() {
            // Преобразование координат для основного полигона (SILAM Europe)
            const polygonCoords = rotatedPolygon.map(coord =>
              ol.proj.fromLonLat([coord[1], coord[0]])
            );
            const polygonFeature = new ol.Feature({
              geometry: new ol.geom.Polygon([polygonCoords])
            });
            const vectorSource = new ol.source.Vector({
              features: [polygonFeature]
            });
            const vectorLayer = new ol.layer.Vector({
              source: vectorSource,
              style: new ol.style.Style({
                stroke: new ol.style.Stroke({
                  color: 'rgba(255,200,0,1)',
                  width: 0.5
                }),
                fill: new ol.style.Fill({
                  color: 'rgba(255,255,0,0.2)'
                })
              })
            });
            
            // Преобразование координат для регионального полигона (SILAM Regional)
            const regionalCoords = rotatedPolygonRegional.map(coord =>
              ol.proj.fromLonLat([coord[1], coord[0]])
            );
            const regionalFeature = new ol.Feature({
              geometry: new ol.geom.Polygon([regionalCoords])
            });
            const regionalVectorSource = new ol.source.Vector({
              features: [regionalFeature]
            });
            const regionalVectorLayer = new ol.layer.Vector({
              source: regionalVectorSource,
              style: new ol.style.Style({
                stroke: new ol.style.Stroke({
                  color: 'rgba(0,255,0,1)',
                  width: 0.5
                }),
                fill: new ol.style.Fill({
                  color: 'rgba(0,255,0,0.2)'
                })
              })
            });

            // Преобразование координат для нового полигона (SILAM Hires)
            let hiresVectorLayer = null;
            if (typeof rotatedPolygonHires !== 'undefined') {
              const hiresCoords = rotatedPolygonHires.map(coord =>
                ol.proj.fromLonLat([coord[1], coord[0]])
              );
              const hiresFeature = new ol.Feature({
                geometry: new ol.geom.Polygon([hiresCoords])
              });
              const hiresVectorSource = new ol.source.Vector({
                features: [hiresFeature]
              });
              hiresVectorLayer = new ol.layer.Vector({
                source: hiresVectorSource,
                style: new ol.style.Style({
                  stroke: new ol.style.Stroke({
                    color: 'rgba(0,120,255,1)',
                    width: 0.5
                  }),
                  fill: new ol.style.Fill({
                    color: 'rgba(0,120,255,0.2)'
                  })
                })
              });
            }
            
            // Базовый слой карты.
            // Используем штатный OpenStreetMap в обеих темах.
            // В тёмной теме применяем CSS-filter только к tile canvas.
            const rasterLayer = new ol.layer.Tile({
              source: new ol.source.OSM()
            });

            // Определяем, мобильное ли устройство и задаем уровень зума
            const isMobile = isMobileDevice();
            const defaultZoom = isMobile ? 6 : 4;

            const layersArr = [rasterLayer, vectorLayer, regionalVectorLayer];
            if (hiresVectorLayer) {
              layersArr.push(hiresVectorLayer);
            }
            

            // -----------------------------------------------------------------
            // Legend + layer toggles (top-right)
            // -----------------------------------------------------------------
            function addCoverageLegend(map, items) {
              const el = document.createElement('div');
              el.className = 'ol-unselectable ol-control legend-control';

              const rowsHtml = items.map((it) => `
                <div class="row">
                  <label class="row">
                    <input type="checkbox" data-layer-id="${it.id}" checked style="accent-color:${it.color};" />
                    <span class="name">${it.name}</span>
                  </label>
                </div>
              `).join('');

              el.innerHTML = `
                ${rowsHtml}
              `;

              // чтобы клики по чекбоксам не тащили карту
              el.addEventListener('mousedown', (e) => e.stopPropagation());
              el.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });

              const control = new ol.control.Control({ element: el });
              map.addControl(control);

              el.querySelectorAll('input[type="checkbox"][data-layer-id]').forEach((cb) => {
                cb.addEventListener('change', () => {
                  const id = cb.getAttribute('data-layer-id');
                  const target = items.find((x) => x.id === id);
                  if (target && target.layer) {
                    target.layer.setVisible(cb.checked);
                  }
                });
              });

              return el;
            }

            // Создаем карту с базовым и векторными слоями
            const map = new ol.Map({
              target: 'map',
              layers: layersArr,
              view: new ol.View({
                center: ol.proj.fromLonLat([20, 20]),
                zoom: defaultZoom
              })
            });

            // Элемент для отображения информации
            const infoWindow = document.getElementById('info-window');
            if (isMobile) {
              // на мобильном: отображаем координаты внутри легенды (внизу, после зон)
              infoWindow.classList.add('legend-info');
            }

            


            // Добавляем легенду/переключатели слоёв (справа сверху)
            const legendItems = [
              { id: 'regional', name: 'SILAM Northern Europe (v6.1)', color: 'rgba(0,255,0,1)',   layer: regionalVectorLayer },
              { id: 'europe',   name: 'SILAM Europe (v6.1)',     color: 'rgba(255,200,0,1)', layer: vectorLayer },
            ];
            if (hiresVectorLayer) {
              legendItems.unshift({ id: 'hires', name: 'SILAM Finland (v6.1)', color: 'rgba(0,120,255,1)', layer: hiresVectorLayer });
            }
            const legendEl = addCoverageLegend(map, legendItems);

            // На мобиле переносим координаты внутрь легенды (после списка зон)
            if (isMobile && legendEl) {
              legendEl.appendChild(infoWindow);
            }
            
            // Функция для обновления информации (координаты и легенда)
            function updateInfo(coordinate, pixel) {
              let layerDesc = '';
              let squareColor = '';
              map.forEachFeatureAtPixel(pixel, function(feature, layer) {
                if (hiresVectorLayer && layer === hiresVectorLayer) {
                  layerDesc = 'SILAM Finland (v6.1)';
                  squareColor = 'rgba(0,120,255,1)';
                  return true;
                } else if (layer === regionalVectorLayer) {
                  layerDesc = 'SILAM Northern Europe (v6.1)';
                  squareColor = 'rgba(0,255,0,1)';
                  return true;
                } else if (layer === vectorLayer) {
                  layerDesc = 'SILAM Europe (v6.1)';
                  squareColor = 'rgba(255,200,0,1)';
                  return true;
                }
              });
              
              let legendHtml = '';
              if (layerDesc) {
                if (isMobile) {
                  // на мобиле: цвет зоны — фоном "плашки" с названием
                  const badgeBg = (typeof squareColor === 'string' && squareColor.startsWith('rgba('))
                    ? squareColor.replace(/rgba\((\s*\d+\s*),(\s*\d+\s*),(\s*\d+\s*),\s*([0-9.]+)\s*\)/, 'rgba($1,$2,$3,0.22)')
                    : squareColor;

                  legendHtml = `<div style="margin-bottom:4px;">
                    <span style="display:inline-block;padding:2px 6px;border-radius:6px;background:${badgeBg};border:1px solid rgba(0,0,0,0.15);">
                      ${layerDesc}
                    </span>
                  </div>`;
                } else {
                  // на десктопе: тоже "плашка" с названием (как на мобиле)
                  const badgeBg = (typeof squareColor === 'string' && squareColor.startsWith('rgba('))
                    ? squareColor.replace(/rgba\((\s*\d+\s*),(\s*\d+\s*),(\s*\d+\s*),\s*([0-9.]+)\s*\)/, 'rgba($1,$2,$3,0.22)')
                    : squareColor;

                  legendHtml = `<div style="margin-bottom:4px;">
                    <span style="display:inline-block;padding:2px 6px;border-radius:6px;background:${badgeBg};border:1px solid rgba(0,0,0,0.15);">
                      ${layerDesc}
                    </span>
                  </div>`;
                }
              }
              
              const coordText = `${i18next.t('lat')}: ${coordinate[1].toFixed(3)}, ${i18next.t('lon')}: ${coordinate[0].toFixed(3)}`;
              infoWindow.innerHTML = legendHtml + coordText;
            }
            
            if (isMobile) {
              // Для мобильных устройств обновляем информацию по событию moveend (используем центр карты)
              map.on('moveend', function() {
                const center = ol.proj.toLonLat(map.getView().getCenter());
                const centerPixel = map.getPixelFromCoordinate(map.getView().getCenter());
                updateInfo(center, centerPixel);
              });
            } else {
              // Для десктопа обновляем информацию по событию pointermove
              map.on('pointermove', function(evt) {
                const coord = ol.proj.toLonLat(evt.coordinate);
                updateInfo(coord, evt.pixel);
                if (!isMobile) {
                  infoWindow.style.left = (evt.pixel[0] + 15) + 'px';
                  infoWindow.style.top = (evt.pixel[1] + 15) + 'px';
                }
              });
            }
            
            map.getView().fit(vectorSource.getExtent(), { padding: [10, 10, 10, 10] });
          };
        });
    </script>
  </body>
</html>
